name: CI

on:
  push:
    branches: ["main", "master"]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    name: Lint + Types
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev,analysis]"

      - name: Ruff format check
        run: python -m ruff format --check .

      - name: Ruff lint
        run: python -m ruff check .

      - name: Mypy (core)
        run: |
          python -m mypy \
            src/trailtraining/cli.py \
            src/trailtraining/doctor.py \
            src/trailtraining/forecast/forecast.py \
            src/trailtraining/llm/constraints.py \
            src/trailtraining/pipelines/run_all.py

  test:
    name: Tests (pytest)
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev,analysis]"

      - name: CLI smoke test
        if: matrix.python-version == '3.11'
        run: |
          trailtraining -h
          trailtraining doctor -h
          trailtraining auth-strava -h
          trailtraining run-all -h
          trailtraining forecast -h
          trailtraining coach -h
          trailtraining eval-coach -h

      - name: Run tests (no coverage)
        if: matrix.python-version != '3.11'
        run: python -m pytest

      - name: Run tests with coverage
        if: matrix.python-version == '3.11'
        run: |
          python -m pytest \
            --cov=trailtraining \
            --cov-report=term-missing \
            --cov-report=xml \
            --cov-fail-under=10

      - name: Coverage gate (constraints core)
        if: matrix.python-version == '3.11'
        run: |
          python -m pytest -q tests \
            --cov=trailtraining.llm.constraints \
            --cov-report=term-missing \
            --cov-fail-under=70



      - name: Upload coverage artifact
        if: matrix.python-version == '3.11'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.python-version }}
          path: coverage.xml
          if-no-files-found: error

  build:
    name: Build package
    runs-on: ubuntu-latest
    needs: [lint, test]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Build sdist/wheel
        run: |
          python -m pip install --upgrade pip
          python -m pip install build
          python -m build
