name: CI

on:
  push:
    branches: ["main", "master"]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    name: Lint + Types
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev,analysis]"

      - name: Validate dependency resolution
        run: python -m pip check

      - name: Ruff format check
        run: python -m ruff format --check .

      - name: Ruff lint
        run: python -m ruff check .

      - name: Mypy (full repo)
        run: python -m mypy src/trailtraining tests

  test:
    name: Tests (pytest)
    runs-on: ubuntu-latest
    timeout-minutes: 20

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev,analysis]"

      - name: Validate dependency resolution
        run: python -m pip check

      - name: CLI smoke test
        if: matrix.python-version == '3.11'
        run: python -m pytest tests/test_cli_smoke.py

      - name: Run tests (no coverage)
        if: matrix.python-version != '3.11'
        run: python -m pytest --junitxml=pytest-${{ matrix.python-version }}.xml

      - name: Run tests with coverage
        if: matrix.python-version == '3.11'
        run: |
          python -m pytest \
            --cov=trailtraining \
            --cov-branch \
            --cov-report=term-missing \
            --cov-report=xml \
            --junitxml=pytest-${{ matrix.python-version }}.xml \
      - name: Coverage gate (data pipeline)
        if: matrix.python-version == '3.11'
        run: |
          python -m pytest -q tests \
            --cov=trailtraining.data.combine \
            --cov=trailtraining.data.garmin \
            --cov-report=term-missing \
            --cov-report=xml:coverage-data-pipeline.xml \
            --cov-fail-under=81

      - name: Coverage gate (llm signals and prompting)
        if: matrix.python-version == '3.11'
        run: |
          python -m pytest -q tests \
            --cov=trailtraining.llm.signals \
            --cov=trailtraining.llm.coach_prompting \
            --cov-report=term-missing \
            --cov-report=xml:coverage-llm.xml \
            --cov-fail-under=87

      - name: Coverage gate (pipelines)
        if: matrix.python-version == '3.11'
        run: |
          python -m pytest -q tests \
            --cov=trailtraining.pipelines.intervals \
            --cov=trailtraining.pipelines.strava \
            --cov-report=term-missing \
            --cov-report=xml:coverage-pipelines.xml \
            --cov-fail-under=77

      - name: Coverage gate (constraints core)
        if: matrix.python-version == '3.11'
        run: |
          python -m pytest -q tests \
            --cov=trailtraining.llm.constraints \
            --cov-report=term-missing \
            --cov-report=xml:coverage-constraints.xml \
            --cov-fail-under=90
      - name: Upload coverage artifact
        if: matrix.python-version == '3.11'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.python-version }}
          path: |
            coverage.xml
            coverage-constraints.xml
            coverage-data-pipeline.xml
            coverage-llm.xml
            coverage-pipelines.xml
            pytest-${{ matrix.python-version }}.xml
          if-no-files-found: error

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.python-version }}
          path: pytest-${{ matrix.python-version }}.xml
          if-no-files-found: error

  build:
    name: Build package
    runs-on: ubuntu-latest
    needs: [lint, test]
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Build sdist/wheel
        run: |
          python -m pip install --upgrade pip
          python -m pip install build
          python -m build

      - name: Install built wheel
        run: |
          python -m pip install --force-reinstall dist/*.whl
          python -m pip check

      - name: Wheel smoke test
        run: |
          python -c "import trailtraining; print('import ok')"
          trailtraining -h
